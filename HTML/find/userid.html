<!-- Scripts Section -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const tabEmail = document.getElementById('tab-email');
            const tabMobile = document.getElementById('tab-mobile');
            const formEmail = document.getElementById('form-email');
            const formMobile = document.getElementById('form-mobile');

            // Active Tab Classes
            const activeTabClasses = ['font-bold', 'text-primary', 'border-primary'];
            const inactiveTabClasses = ['text-on-surface-variant', 'border-transparent'];

            function switchTab(clickedTab) {
                if (clickedTab === 'email') {
                    // Update Tab Styles
                    tabMobile.classList.remove(...activeTabClasses);
                    tabMobile.classList.add(...inactiveTabClasses);
                    tabEmail.classList.remove(...inactiveTabClasses);
                    tabEmail.classList.add(...activeTabClasses);

                    // Update Form Visibility with Transitions
                    formMobile.classList.remove('opacity-100', 'translate-x-0');
                    formMobile.classList.add('opacity-0', 'pointer-events-none', '-translate-x-4');
                    
                    setTimeout(() => {
                        formEmail.classList.remove('opacity-0', 'pointer-events-none', 'translate-x-4', '-translate-x-4');
                        formEmail.classList.add('opacity-100', 'translate-x-0');
                    }, 150);

                } else if (clickedTab === 'mobile') {
                    // Update Tab Styles
                    tabEmail.classList.remove(...activeTabClasses);
                    tabEmail.classList.add(...inactiveTabClasses);
                    tabMobile.classList.remove(...inactiveTabClasses);
                    tabMobile.classList.add(...activeTabClasses);

                    // Update Form Visibility with Transitions
                    formEmail.classList.remove('opacity-100', 'translate-x-0');
                    formEmail.classList.add('opacity-0', 'pointer-events-none', '-translate-x-4');

                    setTimeout(() => {
                        formMobile.classList.remove('opacity-0', 'pointer-events-none', 'translate-x-4', '-translate-x-4');
                        formMobile.classList.add('opacity-100', 'translate-x-0');
                    }, 150);
                }
            }

            // Event Listeners
            tabEmail.addEventListener('click', () => switchTab('email'));
            tabMobile.addEventListener('click', () => switchTab('mobile'));
        });
    </script>
