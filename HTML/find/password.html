<body class="bg-background text-on-background font-body-md text-body-md antialiased flex flex-col min-h-screen">
<!-- 헤더 영역 -->
<header class="bg-surface dark:bg-surface-container-lowest docked full-width top-0 shadow-sm dark:shadow-none transition-all duration-200 ease-in-out">
<div class="flex justify-between items-center px-md py-base w-full max-w-container-max mx-auto">
<a class="font-display-lg text-headline-lg font-bold text-primary dark:text-primary-fixed" href="#">K-market</a>
<nav class="hidden md:flex gap-md items-center">
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">Login</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">Join</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">My Page</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors font-label-md text-label-md" href="#">Cart</a>
</nav>
<div class="flex gap-sm text-primary dark:text-primary-fixed">
<button aria-label="shopping_cart" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">shopping_cart</span></button>
<button aria-label="person" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">person</span></button>
<button aria-label="search" class="hover:text-primary transition-colors"><span class="material-symbols-outlined">search</span></button>
</div>
</div>
</header>
<!-- 메인 컨텐츠 영역 -->
<main class="flex-grow flex items-center justify-center py-lg px-margin-mobile md:px-0 relative overflow-hidden">
<!-- 배경 장식 이미지 -->

<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container w-full max-w-md p-lg relative z-10">
<h1 class="font-headline-lg text-headline-lg text-center text-primary mb-lg">비밀번호 찾기</h1>
<!-- 탭 네비게이션 -->
<div class="flex border-b border-surface-container-high mb-md">
<button class="flex-1 py-sm text-center font-label-md text-label-md border-b-2 transition-colors text-primary border-primary font-bold" id="tab-email" onclick="switchTab('email')">
                    이메일 인증
                </button>
<button class="flex-1 py-sm text-center font-label-md text-label-md border-b-2 hover:text-primary transition-colors text-on-surface-variant border-transparent" id="tab-mobile" onclick="switchTab('mobile')">
                    휴대폰 인증
                </button>
</div>
<!-- 이메일 인증 폼 -->
<form class="space-y-md" id="form-email">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email-id">아이디</label>
<input class="w-full bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email-id" placeholder="아이디를 입력하세요" type="text">
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email-addr">이메일</label>
<div class="flex gap-sm">
<input class="flex-grow bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email-addr" placeholder="이메일 주소" type="email">
<button class="whitespace-nowrap bg-surface-container-low text-primary border border-primary rounded-DEFAULT px-md py-sm font-label-md text-label-md hover:bg-surface-container transition-colors" type="button">인증번호 받기</button>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email-code">인증번호</label>
<div class="flex gap-sm">
<input class="flex-grow bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email-code" placeholder="인증번호 6자리" type="text">
<button class="whitespace-nowrap bg-primary text-on-primary rounded-DEFAULT px-md py-sm font-label-md text-label-md hover:bg-primary-container transition-colors shadow-sm" type="button">확인</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary rounded-lg py-sm font-headline-md text-headline-md hover:bg-primary-container transition-colors shadow-sm mt-lg" type="submit">
                    비밀번호 재설정
                </button>
</form>
<!-- 휴대폰 인증 폼 (초기에는 숨김) -->
<form class="space-y-md hidden" id="form-mobile">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="mobile-id">아이디</label>
<input class="w-full bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="mobile-id" placeholder="아이디를 입력하세요" type="text">
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="mobile-num">휴대폰 번호</label>
<div class="flex gap-sm">
<input class="flex-grow bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="mobile-num" placeholder="'-' 없이 입력" type="tel">
<button class="whitespace-nowrap bg-surface-container-low text-primary border border-primary rounded-DEFAULT px-md py-sm font-label-md text-label-md hover:bg-surface-container transition-colors" type="button">인증번호 받기</button>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="mobile-code">인증번호</label>
<div class="flex gap-sm">
<input class="flex-grow bg-surface text-on-surface border border-surface-container-high rounded-DEFAULT px-sm py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="mobile-code" placeholder="인증번호 6자리" type="text">
<button class="whitespace-nowrap bg-primary text-on-primary rounded-DEFAULT px-md py-sm font-label-md text-label-md hover:bg-primary-container transition-colors shadow-sm" type="button">확인</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary rounded-lg py-sm font-headline-md text-headline-md hover:bg-primary-container transition-colors shadow-sm mt-lg" type="submit">
                    비밀번호 재설정
                </button>
</form>
<div class="mt-md text-center">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors underline" href="#">아이디가 기억나지 않으시나요?</a>
</div>
</div>
</main>
<!-- 푸터 영역 -->
<footer class="bg-surface-container-highest dark:bg-surface-container-high w-full mt-lg px-md py-lg flex flex-col items-center gap-md flat no shadows transition-colors duration-200">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed mb-sm">K-market</div>
<div class="flex flex-wrap justify-center gap-md">
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">About Us</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">Customer Service</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">Privacy Policy</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">Terms of Service</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">FAQ</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline font-body-md text-body-md transition-colors duration-200" href="#">Contact</a>
</div>
<div class="text-on-surface-variant dark:text-outline-variant font-body-md text-body-md mt-md">© 2024 K-market. All rights reserved.</div>
</footer>
<script>
        function switchTab(tabName) {
            const emailForm = document.getElementById('form-email');
            const mobileForm = document.getElementById('form-mobile');
            const emailTab = document.getElementById('tab-email');
            const mobileTab = document.getElementById('tab-mobile');

            if (tabName === 'email') {
                emailForm.classList.remove('hidden');
                mobileForm.classList.add('hidden');
                
                emailTab.classList.add('text-primary', 'border-primary', 'font-bold');
                emailTab.classList.remove('text-on-surface-variant', 'border-transparent');
                
                mobileTab.classList.remove('text-primary', 'border-primary', 'font-bold');
                mobileTab.classList.add('text-on-surface-variant', 'border-transparent');
            } else {
                emailForm.classList.add('hidden');
                mobileForm.classList.remove('hidden');
                
                mobileTab.classList.add('text-primary', 'border-primary', 'font-bold');
                mobileTab.classList.remove('text-on-surface-variant', 'border-transparent');
                
                emailTab.classList.remove('text-primary', 'border-primary', 'font-bold');
                emailTab.classList.add('text-on-surface-variant', 'border-transparent');
            }
        }
    </script>


</body></html>
