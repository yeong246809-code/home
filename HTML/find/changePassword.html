<span class="material-symbols-outlined">search</span>
</button>

</div>

<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-md md:p-lg bg-surface-container-low dark:bg-surface-container">
<!-- Center Card Layout -->
<div class="bg-surface-container-lowest w-full max-w-[480px] rounded-[16px] shadow-[0_4px_24px_rgba(44,74,82,0.04)] p-lg flex flex-col gap-lg transition-all duration-300 hover:shadow-[0_8px_32px_rgba(44,74,82,0.08)]">
<!-- Header Section -->
<div class="text-center flex flex-col gap-base">
<h1 class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-primary dark:text-primary-fixed">비밀번호 변경</h1>
<p class="font-body-md text-body-md text-on-surface-variant dark:text-outline-variant">새로운 비밀번호를 설정해주세요.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-md">
<!-- ID Display (Read-only) -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-primary-container dark:text-primary-fixed-dim">아이디</label>
<div class="w-full px-4 py-3 bg-surface dark:bg-surface-container border border-surface-variant dark:border-outline-variant rounded-lg font-body-md text-body-md text-on-surface-variant dark:text-outline cursor-not-allowed">
                        honggildong
                    </div>
</div>
<!-- New Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-primary-container dark:text-primary-fixed-dim" for="new-password">새 비밀번호</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface dark:bg-surface-container border border-surface-variant dark:border-outline-variant rounded-lg font-body-md text-body-md text-on-surface dark:text-surface-container-lowest focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="new-password" placeholder="영문, 숫자, 특수문자 포함 8자 이상" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-outline dark:text-outline-variant mt-1">사용 가능한 비밀번호입니다.</p>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-primary-container dark:text-primary-fixed-dim" for="confirm-password">새 비밀번호 확인</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface dark:bg-surface-container border border-surface-variant dark:border-outline-variant rounded-lg font-body-md text-body-md text-on-surface dark:text-surface-container-lowest focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="confirm-password" placeholder="새 비밀번호 재입력" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<p id="password-match-message" class="font-label-sm text-label-sm mt-1 hidden"></p>
</div>
<!-- Action Buttons -->
<div class="flex gap-sm mt-md">
<button class="flex-1 py-3 px-4 bg-transparent border border-primary dark:border-primary-fixed text-primary dark:text-primary-fixed font-label-md text-label-md rounded-lg hover:bg-surface-variant dark:hover:bg-surface-container-high transition-colors" type="button">
                        취소
                    </button>
<button class="flex-1 py-3 px-4 bg-primary dark:bg-primary-fixed text-on-primary dark:text-on-primary-fixed font-label-md text-label-md rounded-lg hover:bg-primary-container dark:hover:bg-primary-fixed-dim transition-colors shadow-sm" type="submit">

<script>
(function() {
    const newPwd = document.getElementById('new-password');
    const confirmPwd = document.getElementById('confirm-password');
    const message = document.getElementById('password-match-message');

    confirmPwd.addEventListener('blur', () => {
        if (!confirmPwd.value) {
            message.classList.add('hidden');
            return;
        }

        message.classList.remove('hidden');
        if (newPwd.value === confirmPwd.value) {
            message.textContent = '비밀번호가 일치합니다';
            message.className = 'font-label-sm text-label-sm mt-1 text-secondary dark:text-secondary-fixed';
        } else {
            message.textContent = '비밀번호가 일치하지 않습니다';
            message.className = 'font-label-sm text-label-sm mt-1 text-error dark:text-error-container';
        }
    });
})();
</script></body></html>
